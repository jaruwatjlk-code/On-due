<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Route View</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d14;--surface:#13161f;--surface2:#191d2a;--surface3:#1f2436;--surface4:#252b3d;
  --border:#1f2436;--border2:#2a3050;--border3:#343d5c;
  --text:#e2e8f0;--text2:#8892aa;--text3:#404d6a;
  --accent:#4f7cff;--accent2:#7c3aed;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;
  --shadow:rgba(0,0,0,.5);
  --radius:13px;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:inherit}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

/* ══ KEYFRAMES ══ */
@keyframes pulse-ring{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.55);opacity:0}100%{transform:scale(1.55);opacity:0}}
@keyframes flow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.9}100%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countDown{from{width:100%}to{width:0%}}
@keyframes lbar{0%,100%{opacity:.6}50%{opacity:1}}

/* ══ NAV ══ */
.topnav{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.2rem;gap:.7rem;position:sticky;top:0;z-index:300}
.nav-logo{font-size:.9rem;font-weight:800;display:flex;align-items:center;gap:.45rem;white-space:nowrap}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:shimmer 2s infinite}
.nav-tabs{display:flex;gap:.2rem;margin-left:.4rem}
.nav-tab{padding:.28rem .75rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid transparent;color:var(--text3);background:transparent;transition:all .15s}
.nav-tab:hover{color:var(--text2);background:var(--surface3)}
.nav-tab.on{color:var(--accent);background:rgba(79,124,255,.1);border-color:rgba(79,124,255,.25)}
.nav-spacer{flex:1}
.nav-btn{padding:.28rem .65rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .14s;display:flex;align-items:center;gap:.3rem}
.nav-btn:hover{color:var(--text);border-color:var(--border3)}
.refresh-btn{position:relative;overflow:hidden}
.refresh-btn .spin{animation:spin .7s linear infinite}

/* countdown bar */
#countdownBar{height:2px;background:var(--accent);position:sticky;top:56px;z-index:299;transform-origin:left;opacity:.7}
#loadingBar{height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));background-size:200%;position:sticky;top:56px;z-index:299;display:none;animation:lbar .9s ease infinite}

/* ══ FILTER BAR ══ */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem 1.2rem;position:sticky;top:58px;z-index:280;display:flex;flex-direction:column;gap:.4rem}
.route-track-wrap{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:.35rem 0 .15rem;scrollbar-width:none}
.route-track-wrap::-webkit-scrollbar{display:none}

/* station node */
.rts{display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;transition:transform .15s}
.rts:hover{transform:translateY(-1px)}
.rts-node{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;border:2.5px solid;transition:all .2s;position:relative}
.rts-node.sel{box-shadow:0 0 0 3px rgba(255,255,255,.12),0 0 20px var(--sel-col,rgba(79,124,255,.6))}
.rts-pct{font-size:.55rem;color:var(--text3);margin-top:.18rem;font-weight:600;min-height:13px;text-align:center}
.rts-cnt{display:flex;justify-content:center;min-height:14px}
.rts-badge{font-size:.56rem;font-weight:800;border-radius:20px;padding:.02rem .28rem;color:#fff}
.rt-line{height:2.5px;min-width:12px;flex:1;margin-top:20px;z-index:1;border-radius:1px;transition:background .3s;flex-shrink:0}
.rt-line.flow{background-size:200% 100%;animation:flow 1.8s linear infinite}

/* fb rows */
.fb-row{display:flex;align-items:center;gap:.38rem;flex-wrap:wrap}
.fb-lbl{font-size:.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:.2rem;padding:.19rem .56rem;border-radius:20px;font-size:.7rem;font-weight:600;border:1.5px solid var(--border2);color:var(--text3);background:transparent;cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--border3);color:var(--text2)}
.chip.on{color:#fff;border-color:transparent}
.fb-sep{width:1px;height:16px;background:var(--border2);margin:0 .05rem;flex-shrink:0}
.search-inp{padding:.27rem .6rem;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.76rem;outline:none;width:160px;transition:border-color .14s}
.search-inp:focus{border-color:var(--accent)}
.date-inp{padding:.27rem .55rem;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.74rem;outline:none;transition:border-color .14s;color-scheme:dark}
.date-inp:focus{border-color:var(--accent)}

/* ══ MAIN ══ */
.main{padding:.85rem 1.2rem 3rem;max-width:1500px;margin:0 auto}
.tab-panel{display:none}.tab-panel.on{display:block;animation:fadeUp .2s ease}

/* date group */
.dg-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.48rem}
.dg-date{font-size:.7rem;font-weight:700;color:var(--text2);white-space:nowrap}
.dg-line{flex:1;height:1px;background:var(--border)}
.dg-cnt{font-size:.66rem;color:var(--text3);white-space:nowrap}
.today-tag{background:var(--accent);color:#fff;border-radius:4px;padding:.03rem .3rem;font-size:.57rem;font-weight:700;margin-left:.28rem;vertical-align:middle}
.date-group{margin-bottom:1.2rem}

/* ══ JOB CARD ══ */
.job-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:.7rem .95rem .62rem;margin-bottom:.42rem;
  transition:transform .18s,box-shadow .18s,border-color .15s,background .15s;
  position:relative;overflow:hidden;
  animation:fadeUp .25s ease both;
}
.job-card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);opacity:0;background:radial-gradient(ellipse at top left,rgba(79,124,255,.06),transparent 60%);transition:opacity .25s;pointer-events:none}
.job-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.35);border-color:var(--border2)}
.job-card:hover::before{opacity:1}
.job-card.overdue{border-left:3px solid var(--red)}

/* card top */
.jc-top{display:flex;align-items:center;gap:.52rem;margin-bottom:.48rem;flex-wrap:wrap}
.jc-num{font-size:.6rem;color:var(--text3);font-weight:700;flex-shrink:0;min-width:20px}
.jc-name{font-weight:800;font-size:.88rem;flex:1;min-width:80px}
.jc-order{font-size:.68rem;color:var(--text2);font-weight:600;white-space:nowrap}
.jc-right{display:flex;align-items:center;gap:.32rem;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
.fg-box{display:inline-flex;align-items:center;gap:.2rem;padding:.14rem .46rem;border-radius:7px;font-size:.67rem;font-weight:700;border:1.5px solid;white-space:nowrap;cursor:text;transition:background .12s}
.fg-box:hover{background:var(--surface3)!important}
.fg-edit{width:60px;background:transparent;border:none;outline:none;color:inherit;font-weight:700;font-size:.67rem;font-family:inherit;text-align:right}
.jc-status{padding:.15rem .5rem;border-radius:20px;font-size:.66rem;font-weight:700;white-space:nowrap}
.jc-time{font-size:.66rem;color:var(--text3);white-space:nowrap}
.overdue-tag{font-size:.58rem;font-weight:700;color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);border-radius:20px;padding:.07rem .34rem}
.notice-tag{font-size:.58rem;font-weight:700;color:var(--orange);background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.22);border-radius:20px;padding:.07rem .34rem}

/* ══ ROUTE BAR ══ */
.jc-route-wrap{display:flex;align-items:center;gap:.3rem;margin:.04rem 0;flex-wrap:nowrap}
.jc-route{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;padding:.06rem 0;flex-shrink:0}
.jc-route::-webkit-scrollbar{display:none}

/* NODE — perfect circle guaranteed */
.jn{
  width:32px;height:32px;min-width:32px;min-height:32px;
  border-radius:50%;border:2px solid;
  display:flex;align-items:center;justify-content:center;
  font-size:.51rem;font-weight:800;
  flex-shrink:0;cursor:pointer;
  transition:transform .15s,box-shadow .15s,opacity .2s;
  position:relative;
}
.jn:hover{transform:scale(1.15);z-index:10}
.jn-line{width:9px;min-width:9px;height:2.5px;flex-shrink:0;border-radius:1px;transition:background .3s}

/* node states */
.jn-wip::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:2px solid currentColor;opacity:0;
  animation:pulse-ring 1.8s ease-out infinite;
}
.jn-active{box-shadow:0 0 0 3px rgba(255,255,255,.1),0 0 16px var(--nc,rgba(79,124,255,.7))}
.jn-done{opacity:.22}
.jn-skip{opacity:.18}/* ข้าม process นี้ */
.jn-pending{opacity:.2}
.jn-fail-skip{/* ข้าม = จาง แต่ยังเห็น */opacity:.2;filter:grayscale(.5)}

.split-tag{font-size:.56rem;font-weight:800;background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.25);border-radius:5px;padding:.04rem .28rem;white-space:nowrap;flex-shrink:0}

/* ══ PROGRESS SUMMARY ══ */
.prog-wrap{margin:.38rem 0 .06rem;display:flex;flex-direction:column;gap:.28rem}
.prog-bar-row{display:flex;align-items:center;gap:.45rem}
.prog-bar{flex:1;height:3.5px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-pct{font-size:.6rem;font-weight:800;color:var(--text3);min-width:26px;text-align:right}
.prog-chips{display:flex;align-items:center;gap:.22rem;flex-wrap:wrap}
.prog-lbl{font-size:.58rem;font-weight:700;color:var(--text3);white-space:nowrap}
.prog-chip{display:inline-flex;align-items:center;padding:.06rem .3rem;border-radius:5px;font-size:.58rem;font-weight:800;border:1px solid;white-space:nowrap}
.pc-now{/* colored inline */}
.pc-rem{background:var(--surface3);color:var(--text3);border-color:var(--border2)}
.pc-skip{background:rgba(100,116,139,.08);color:var(--text3);border-color:var(--border2);text-decoration:line-through;opacity:.6}

/* card bottom */
.jc-bottom{display:flex;align-items:center;gap:.4rem;margin-top:.45rem;flex-wrap:wrap}
.pchip{display:inline-flex;align-items:center;padding:.08rem .34rem;border-radius:20px;font-size:.58rem;font-weight:700;border:1px solid;white-space:nowrap}
.jc-detail{font-size:.64rem;color:var(--text3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STATUS BADGE COLORS */
.ss1{background:#16a34a;color:#fff}
.ss2{background:#ea580c;color:#000}
.ss3{background:#dc2626;color:#fff}
.ss4{background:#ca8a04;color:#000}
.ss5{background:#7c3aed;color:#fff}

/* ══ TIMELINE TAB ══ */
.tl-wrap{overflow-x:auto;padding-bottom:.5rem}
.tl-grid{display:grid;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:700px}
.tl-header{display:flex;background:var(--surface2);border-bottom:1px solid var(--border)}
.tl-row-label{width:200px;min-width:200px;padding:.5rem .75rem;display:flex;align-items:center;gap:.45rem;border-right:1px solid var(--border);flex-shrink:0}
.tl-header .tl-row-label{font-size:.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.tl-stations{display:flex;flex:1}
.tl-st-head{flex:1;padding:.45rem .3rem;text-align:center;font-size:.6rem;font-weight:700;border-right:1px solid var(--border);position:relative}
.tl-st-head:last-child{border-right:none}
.tl-st-dot{width:10px;height:10px;border-radius:50%;margin:.25rem auto .1rem;border:2px solid}
.tl-body-row{display:flex;border-bottom:1px solid var(--border);transition:background .12s}
.tl-body-row:last-child{border-bottom:none}
.tl-body-row:hover{background:var(--surface2)}
.tl-job-info{width:200px;min-width:200px;padding:.5rem .75rem;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:.18rem;flex-shrink:0}
.tl-job-name{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-job-meta{font-size:.6rem;color:var(--text3)}
.tl-cells{display:flex;flex:1}
.tl-cell{flex:1;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:52px;position:relative;cursor:pointer;transition:background .12s}
.tl-cell:last-child{border-right:none}
.tl-cell:hover{background:var(--surface3)}
.tl-cell-inner{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:800;border:2px solid;transition:all .18s}
.tl-cell-inner.wip{position:relative}
.tl-cell-inner.wip::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid currentColor;opacity:0;animation:pulse-ring 1.8s ease-out infinite}

/* time axis */
.tl-time-wrap{display:flex;flex:1;position:relative;min-height:52px}
.tl-time-bar{position:absolute;height:60%;top:20%;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;white-space:nowrap;overflow:hidden;padding:0 .3rem;transition:all .2s}
.tl-now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7;z-index:5}
.tl-now-line::before{content:'NOW';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.5rem;font-weight:800;color:var(--red);white-space:nowrap}

/* toggle btn */
.tl-toggle{display:flex;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:.7rem;width:fit-content}
.tl-toggle-btn{padding:.3rem .75rem;font-size:.73rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .13s}
.tl-toggle-btn.on{background:var(--accent);color:#fff}

/* ══ PROCESS MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;transform:translateY(12px);transition:transform .22s cubic-bezier(.34,1.4,.64,1)}
.overlay.open .modal{transform:translateY(0)}
/* swipe handle */
.modal::before{content:'';display:block;width:34px;height:3.5px;background:var(--border3);border-radius:2px;margin:.5rem auto .1rem}
.modal-head{display:flex;align-items:center;gap:.55rem;padding:.75rem 1.1rem .65rem;border-bottom:1px solid var(--border)}
.modal-title{font-weight:800;font-size:.87rem;flex:1;display:flex;align-items:center;gap:.5rem}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:.1rem .25rem;border-radius:5px;line-height:1;transition:color .12s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:.8rem 1.1rem}
.mfield{margin-bottom:.8rem}
.mlabel{font-size:.63rem;font-weight:700;color:var(--text3);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.05em;display:block}
.minput,.mtextarea{width:100%;padding:.42rem .7rem;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:.82rem;outline:none;transition:border-color .14s;appearance:none}
.minput:focus,.mtextarea:focus{border-color:var(--accent)}
.mtextarea{resize:vertical;min-height:65px;line-height:1.5}
.psb-row{display:flex;gap:.38rem}
.psb{flex:1;padding:.36rem .5rem;border-radius:9px;font-size:.72rem;font-weight:700;cursor:pointer;border:2px solid;transition:all .13s;text-align:center;background:transparent}
.psb:hover{opacity:.85}
.psb.sel{outline:3px solid rgba(255,255,255,.4);outline-offset:2px}
/* history */
.modal-hist{padding:.6rem 1.1rem .3rem;border-top:1px solid var(--border)}
.hist-title{font-size:.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
.hist-item{font-size:.65rem;color:var(--text2);padding:.2rem 0;border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:baseline}
.hist-item:last-child{border-bottom:none}
.hist-time{color:var(--text3);white-space:nowrap;font-size:.6rem}
.modal-footer{display:flex;justify-content:flex-end;gap:.42rem;padding:.62rem 1.1rem .85rem;border-top:1px solid var(--border)}
.btn{padding:.38rem .85rem;border-radius:9px;font-size:.77rem;font-weight:700;cursor:pointer;border:none;transition:all .13s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.87;transform:scale(.98)}
.btn-secondary{background:var(--surface3);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover{color:var(--text)}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:1.2rem;right:1.2rem;padding:.55rem .85rem;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;font-size:.78rem;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.45);z-index:600;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;max-width:260px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(34,197,94,.3)}
.toast.error{border-color:rgba(239,68,68,.3)}

.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-icon{font-size:2rem;margin-bottom:.5rem}
</style>
</head>
<body>

<!-- NAV -->
<div class="topnav">
  <div class="nav-logo"><div class="nav-dot"></div>Route View</div>
  <div class="nav-tabs">
    <button class="nav-tab on" onclick="switchTab('route')">🚉 Route</button>
    <button class="nav-tab" onclick="switchTab('timeline')">📊 Timeline</button>
  </div>
  <div class="nav-spacer"></div>
  <span id="pollLabel" style="font-size:.62rem;color:var(--text3)"></span>
  <button id="refreshBtn" class="nav-btn refresh-btn" onclick="loadData(true)" title="Refresh (R)">🔄 Refresh</button>
</div>
<div id="loadingBar"></div>
<div id="countdownBar" style="height:2px;background:var(--accent);opacity:.5;position:sticky;top:58px;z-index:299;transform-origin:left"></div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <!-- Route track -->
  <div class="route-track-wrap" id="routeTrack"></div>
  <!-- Row 1: status + split + date -->
  <div class="fb-row">
    <span class="fb-lbl">สถานะ</span>
    <span class="chip on" data-f="status" data-v="" onclick="setChip(this,'status','')">ทั้งหมด</span>
    <span class="chip" data-f="status" data-v="กำลังดำเนินการ" onclick="setChip(this,'status','กำลังดำเนินการ')">🟡 กำลังทำ</span>
    <span class="chip" data-f="status" data-v="ส่งครบ" onclick="setChip(this,'status','ส่งครบ')">🟢 ส่งครบ</span>
    <span class="chip" data-f="status" data-v="ส่งไม่ได้" onclick="setChip(this,'status','ส่งไม่ได้')">🔴 ส่งไม่ได้</span>
    <span class="chip" data-f="status" data-v="แบ่งส่ง" onclick="setChip(this,'status','แบ่งส่ง')">🟠 แบ่งส่ง</span>
    <span class="chip" data-f="status" data-v="HOLD" onclick="setChip(this,'status','HOLD')">🟣 HOLD</span>
    <span class="chip" data-f="status" data-v="overdue" style="border-color:rgba(239,68,68,.3);color:var(--red)" onclick="setChip(this,'status','overdue')">⚠ เกิน</span>
    <div class="fb-sep"></div>
    <span class="fb-lbl">กอง</span>
    <span class="chip on" data-f="split" data-v="" onclick="setChip(this,'split','')">ทั้งหมด</span>
    <span class="chip" data-f="split" data-v="single" onclick="setChip(this,'split','single')">กองเดียว</span>
    <span class="chip" data-f="split" data-v="multi" onclick="setChip(this,'split','multi')">⚡ แยกกอง</span>

<script>
// ══ CONFIG ════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1xq_fCCTvKkJnx3sBI3eWXaJp-B1cjhFumAg0bac0pX5n9GswDZkEMrynkf4ln22Apw/exec';
const POLL_INTERVAL = 10000; // 10 วิ

const ROUTE = ['PR','SP','CA','LA','DC','ST','CK','SG','MGL','GL'];
const PC = {PR:'#f97316',SP:'#a855f7',CA:'#10b981',LA:'#22d3ee',DC:'#3b82f6',ST:'#6366f1',CK:'#ec4899',SG:'#06b6d4',MGL:'#f43f5e',GL:'#ef4444'};
const PCOL = {
  'อุทัย':'#f97316','ตั้ม':'#a855f7','อิ':'#06b6d4','ยู':'#10b981','ตุ๊ก':'#3b82f6','ณรงค์':'#f43f5e',
  'สุริยา':'#eab308','ลลิตา':'#8b5cf6','นัท':'#0ea5e9','จ๊ะจ๋า':'#14b8a6','ปรีชา':'#ec4899',
  'ศักดิ์ศรี':'#84cc16','ถาวร':'#f59e0b','ทองตัน':'#6366f1','บุญฑิน':'#22d3ee','แพรวา':'#fb923c',
  'โยเซฟ':'#c084fc','กบ':'#34d399','ดวง':'#60a5fa','ออฟ':'#f472b6','วิโรจน์':'#a3e635',
  'แซม':'#facc15','มด':'#2dd4bf','ทราย':'#38bdf8','ปัญญา':'#4ade80','แมน':'#fbbf24',
  'ศรีประไพร':'#e879f9','เจาว':'#67e8f9','Tui':'#fcd34d','น้อง':'#fb7185',
};

// ══ STATE ════════════════════════════════════════════
let JOBS = [];
let fStatus='', fSplit='', fStation=null, fDateStart=null, fDateEnd=null, srch='';
let editJobId=null, editProcId=null, editPS=null;
let currentTab='route', tlMode='process';
let pollTimer=null, countdownAnim=null;
let isLoading=false;

// ══ HELPERS ══════════════════════════════════════════
function ct(hex){
  try{
    const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    const tL=c=>c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);
    return .2126*tL(r)+.7152*tL(g)+.0722*tL(b)>.45?'#111':'#fff';
  }catch(e){return'#fff';}
}
function isOD(j){
  if(j.status!=='กำลังดำเนินการ')return false;
  const[y,m,d]=(j.date||'').split('-').map(Number);if(!y)return false;
  const hm=j.time?.match(/(\d+):(\d+)/);
  return new Date()>new Date(y,m-1,d,hm?+hm[1]:23,hm?+hm[2]:59);
}
function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function fmtDate(ds){
  if(!ds)return'—';
  const[y,m,d]=ds.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const days=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const mons=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return`${days[dt.getDay()]} ${d} ${mons[m-1]} ${y+543}`;
}
function sCls(s){return{'ส่งครบ':'ss1','แบ่งส่ง':'ss2','ส่งไม่ได้':'ss3','กำลังดำเนินการ':'ss4','HOLD':'ss5'}[s]||'';}

// ══ LOAD DATA ════════════════════════════════════════
async function loadData(manual=false){
  if(isLoading)return;
  isLoading=true;
  const btn=document.getElementById('refreshBtn');
  btn.innerHTML='<span class="spin">⏳</span> กำลังโหลด...';
  document.getElementById('loadingBar').style.display='block';
  try{
    const res=await fetch(`${SCRIPT_URL}?action=getAll`);
    const json=await res.json();
    if(json.error)throw new Error(json.error);
    JOBS=(json.jobs||[]).map(r=>({
      id:r.job_id,num:String(r.num||''),name:String(r.name||''),
      order:Number(r.order_qty||0),fg:Number(r.fg_qty||0),
      date:String(r.date||''),time:String(r.time||''),
      status:String(r.status||''),process:String(r.process||''),
      persons:String(r.persons||''),detail:String(r.detail||''),
      notice:String(r.notice||''),procData:r.procData||{},
      _history:r._history||[],
    }));
    render();
    if(manual)showToast(`✅ โหลดแล้ว ${JOBS.length} งาน`,'success');
  }catch(e){
    if(!JOBS.length)showError(`❌ โหลดไม่ได้: ${e.message}`);
    else showToast('⚠ Refresh ไม่สำเร็จ','error');
  }finally{
    isLoading=false;
    btn.innerHTML='🔄 Refresh';
    document.getElementById('loadingBar').style.display='none';
    resetCountdown();
  }
}

// ══ POLLING ══════════════════════════════════════════
function resetCountdown(){
  const bar=document.getElementById('countdownBar');
  bar.style.transition='none';bar.style.width='100%';
  requestAnimationFrame(()=>{
    bar.style.transition=`width ${POLL_INTERVAL/1000}s linear`;
    bar.style.width='0%';
  });
  clearTimeout(pollTimer);
  pollTimer=setTimeout(()=>loadData(false), POLL_INTERVAL);
}

// ══ TABS ═════════════════════════════════════════════
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.querySelector(`.nav-tab[onclick="switchTab('${t}')"]`).classList.add('on');
  document.getElementById(`tab-${t}`).classList.add('on');
  if(t==='timeline'){
    const tl=document.getElementById('tlDate');
    if(!tl.value)tl.value=todayStr();
    renderTimeline();
  }
}
function setTlMode(m){
  tlMode=m;
  document.getElementById('tlProcBtn').classList.toggle('on',m==='process');
  document.getElementById('tlTimeBtn').classList.toggle('on',m==='time');
  renderTimeline();
}

// ══ FILTERS ══════════════════════════════════════════
function setChip(el,f,v){
  document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(c=>{c.classList.remove('on');c.style.background='';});
  el.classList.add('on');
  if(!el.style.background)el.style.background=f==='status'&&v==='overdue'?'rgba(239,68,68,.2)':'var(--accent)';
  if(f==='status')fStatus=v;
  else if(f==='split')fSplit=v;
  render();
}
function setDatePreset(p,el){
  document.querySelectorAll('.chip[data-f="date"]').forEach(c=>{c.classList.remove('on');c.style.background='';});
  el.classList.add('on');el.style.background='var(--accent)';
  const t=todayStr();
  if(p==='all'){fDateStart=null;fDateEnd=null;}
  else if(p==='today'){fDateStart=t;fDateEnd=t;}
  else if(p==='yesterday'){fDateStart=addDays(t,-1);fDateEnd=addDays(t,-1);}
  else if(p==='week'){fDateStart=addDays(t,-6);fDateEnd=t;}
  render();
}
function toggleStation(s){fStation=fStation===s?null:s;render();}

function getFiltered(){
  return JOBS.filter(j=>{
    if(fStatus==='overdue'&&!isOD(j))return false;
    if(fStatus&&fStatus!=='overdue'&&j.status!==fStatus)return false;
    const ps=j.process.split(',').map(x=>x.trim()).filter(Boolean);
    if(fSplit==='single'&&ps.length>1)return false;
    if(fSplit==='multi'&&ps.length<2)return false;
    if(fStation&&!ps.includes(fStation))return false;
    if(fDateStart&&j.date&&j.date<fDateStart)return false;
    if(fDateEnd&&j.date&&j.date>fDateEnd)return false;
    if(srch){const q=srch;if(!j.name.toLowerCase().includes(q)&&!(j.order+'').includes(q)&&!j.persons.toLowerCase().includes(q)&&!j.status.toLowerCase().includes(q))return false;}
    return true;
  });
}

// ══ ROUTE TRACK ══════════════════════════════════════
function renderRouteTrack(){
  const data=getFiltered();
  const cnt={},wipCnt={},doneCnt={};
  ROUTE.forEach(r=>{cnt[r]=0;wipCnt[r]=0;doneCnt[r]=0;});
  data.forEach(j=>{
    const pd=j.procData||{};
    ROUTE.forEach(s=>{
      const pst=pd[s]?.status;
      if(pst==='wip'){cnt[s]++;wipCnt[s]++;}
      else if(pst==='done'){cnt[s]++;doneCnt[s]++;}
    });
    // also count active from j.process if no procData
    if(!Object.keys(pd).length){
      j.process.split(',').map(x=>x.trim()).filter(Boolean).forEach(p=>{if(cnt[p]!==undefined)cnt[p]++;});
    }
  });
  let h='';
  ROUTE.forEach((s,i)=>{
    const col=PC[s]||'#64748b';const has=cnt[s]>0;const sel=fStation===s;const tc=ct(col);
    const totalHere=cnt[s];const doneHere=doneCnt[s];
    const pct=totalHere>0?Math.round(doneHere/totalHere*100):null;
    h+=`<div class="rts" onclick="toggleStation('${s}')">
      <div class="rts-node${sel?' sel':''}" style="
        background:${has?(sel?col:col+'1e'):'transparent'};
        border-color:${sel?'#fff':(has?col:'#1f2436')};
        color:${has?(sel?tc:col):'#404d6a'};
        --sel-col:${col}66;
      ">${s}</div>
      <div class="rts-pct">${pct!==null?`${pct}%`:''}</div>
      <div class="rts-cnt">${cnt[s]>0?`<span class="rts-badge" style="background:${col}">${cnt[s]}</span>`:''}</div>
    </div>`;
    if(i<ROUTE.length-1){
      const c2=PC[ROUTE[i+1]]||'#64748b';
      const on=cnt[s]>0&&cnt[ROUTE[i+1]]>0;
      const flowLine=wipCnt[s]>0||wipCnt[ROUTE[i+1]]>0;
      h+=`<div class="rt-line${flowLine?' flow':''}" style="background:${on?`linear-gradient(90deg,${col}55,${c2}55)`:'#1f2436'};${flowLine?`background-image:linear-gradient(90deg,${col}88,${c2}88,${col}88)`:''}"></div>`;
    }
  });
  document.getElementById('routeTrack').innerHTML=h;
}

// ══ PROGRESS ═════════════════════════════════════════
function getProgress(j){
  const pd=j.procData||{};const isDone=j.status==='ส่งครบ';
  const done=[],active=[],remaining=[],skipped=[];
  if(isDone){ROUTE.forEach(s=>done.push(s));return{done,active,remaining,skipped,isDone:true};}
  let frontier=-1;
  ROUTE.forEach((s,i)=>{if(pd[s]?.status)frontier=Math.max(frontier,i);});
  const fallbackAps=j.process.split(',').map(s=>s.trim()).filter(Boolean);
  if(!Object.keys(pd).length)fallbackAps.forEach(p=>{const i=ROUTE.indexOf(p);if(i>frontier)frontier=i;});
  ROUTE.forEach((s,i)=>{
    const pst=pd[s]?.status;
    if(pst==='skip')skipped.push(s);
    else if(pst==='done')done.push(s);
    else if(pst==='wip')active.push(s);
    else if(!Object.keys(pd).length&&fallbackAps.includes(s))active.push(s);
    else if(i>frontier)remaining.push(s);
    else if(i<=frontier&&!pst)done.push(s);
  });
  return{done,active,remaining,skipped,isDone:false};
}

function getActiveProcs(j){
  const pd=j.procData||{};
  const wip=ROUTE.filter(s=>pd[s]?.status==='wip');
  if(wip.length)return wip;
  return j.process.split(',').map(s=>s.trim()).filter(Boolean);
}

// ══ RENDER JOB ROUTE BAR ═════════════════════════════
function renderJobRoute(j){
  const pd=j.procData||{};const isDone=j.status==='ส่งครบ';
  let frontier=-1;
  ROUTE.forEach((s,i)=>{if(pd[s]?.status)frontier=Math.max(frontier,i);});
  const aps=getActiveProcs(j);
  aps.forEach(p=>{const i=ROUTE.indexOf(p);if(i>frontier)frontier=i;});
  let h='<div class="jc-route">';
  ROUTE.forEach((s,i)=>{
    const col=PC[s]||'#64748b';const pst=pd[s]?.status;
    let bg,bc,fc,cls='jn',shadow='',extra='';
    if(isDone){
      bg=col+'12';bc=col+'25';fc=col+'44';cls+=' jn-done';
    }else if(pst==='skip'){
      // ข้าม process นี้ — จางมาก
      bg='transparent';bc=col+'18';fc=col+'22';cls+=' jn-skip';
    }else if(pst==='wip'){
      bg=col;bc=col;fc=ct(col);cls+=' jn-active jn-wip';shadow=`--nc:${col}88`;
    }else if(pst==='done'){
      bg='#22c55e16';bc='#22c55e40';fc='#22c55e70';cls+=' jn-done';
    }else if(aps.includes(s)&&!pst){
      // active from j.process fallback
      bg=col;bc=col;fc=ct(col);cls+=' jn-active jn-wip';shadow=`--nc:${col}88`;
    }else if(i>frontier){
      bg='transparent';bc=col+'1a';fc=col+'22';cls+=' jn-pending';
    }else{
      bg=col+'12';bc=col+'22';fc=col+'40';cls+=' jn-done';
    }
    // skip = เพิ่ม strikethrough effect via CSS text-decoration on inner span? use ::after overlay instead
    if(pst==='skip')extra=' title="ข้าม process นี้ — คลิกเพื่อแก้ไข"';
    else if(!pst&&i>frontier)extra=' title="คลิกเพื่อบันทึกสถานะ"';
    else extra=` title="${[s,pd[s]?.time?'⏰'+pd[s].time:'',pd[s]?.comment?'💬'+pd[s].comment.slice(0,25):''].filter(Boolean).join(' | ')}"`;
    h+=`<div class="${cls}" style="background:${bg};border-color:${bc};color:${fc};${shadow}"${extra} onclick="event.stopPropagation();openProcModal(${JSON.stringify(j.id)},'${s}')">${s}</div>`;
    if(i<ROUTE.length-1){
      const lc=(!isDone&&i<frontier&&pst!=='skip')?col+'50':'#1a1f30';
      h+=`<div class="jn-line" style="background:${lc}"></div>`;
    }
  });
  h+='</div>';
  if(aps.filter(p=>pd[p]?.status==='wip'||(!pd[p]?.status)).length>1)
    h+=`<span class="split-tag">⚡ แยก ${aps.length} กอง</span>`;
  return h;
}

// ══ PROGRESS SUMMARY ═════════════════════════════════
function renderProgressSummary(j){
  const{done,active,remaining,skipped,isDone}=getProgress(j);
  const effective=ROUTE.length-skipped.length;
  const pct=effective>0?Math.round(done.length/effective*100):100;
  const barCol=isDone?'#22c55e':pct>=80?'#84cc16':pct>=50?'#3b82f6':'var(--accent)';
  if(isDone)return`<div class="prog-wrap">
    <div class="prog-bar-row"><div class="prog-bar"><div class="prog-fill" style="width:100%;background:#22c55e"></div></div>
    <span class="prog-pct" style="color:#22c55e">100%</span></div></div>`;
  const activeChips=active.map(s=>`<span class="prog-chip pc-now" style="background:${PC[s]||'#4f7cff'}1e;color:${PC[s]||'#4f7cff'};border-color:${PC[s]||'#4f7cff'}44">${s}</span>`).join('');
  const remChips=remaining.map(s=>`<span class="prog-chip pc-rem">${s}</span>`).join('');
  const skipChips=skipped.map(s=>`<span class="prog-chip pc-skip">${s}</span>`).join('');
  return`<div class="prog-wrap">
    <div class="prog-bar-row">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${barCol}"></div></div>
      <span class="prog-pct">${pct}%</span>
    </div>
    <div class="prog-chips">
      ${active.length?`<span class="prog-lbl">📍</span>${activeChips}`:''}
      ${remaining.length?`<span class="prog-lbl" style="margin-left:${active.length?.35:0}rem">⏳</span>${remChips}`:''}
      ${skipped.length?`<span class="prog-lbl" style="margin-left:.35rem">⊘</span>${skipChips}`:''}
    </div>
  </div>`;
}

// ══ RENDER CARDS ═════════════════════════════════════
function render(){
  renderRouteTrack();
  if(currentTab==='timeline'){renderTimeline();return;}
  const data=getFiltered();
  const el=document.getElementById('routeContent');
  if(!data.length){
    let msg='ไม่มีงาน';
    if(srch)msg=`ไม่พบ "${srch}"`;
    else if(fStatus&&fStatus!=='overdue')msg=`ไม่มีงานสถานะ "${fStatus}"`;
    else if(fStatus==='overdue')msg='ไม่มีงานที่เกินกำหนด';
    el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>${msg}</div>`;return;
  }
  const grps={};data.forEach(j=>(grps[j.date]||(grps[j.date]=[])).push(j));
  const today=todayStr();
  el.innerHTML=Object.keys(grps).sort().map((dk,gi)=>{
    const jobs=grps[dk];const isToday=dk===today;
    const cards=jobs.map((j,ci)=>{
      const od=isOD(j);const scls=sCls(j.status);
      const fgPct=j.order>0?Math.round(j.fg/j.order*100):0;
      const fgC=fgPct>=100?'#22c55e':fgPct>=70?'#84cc16':fgPct>=40?'#eab308':'var(--red)';
      const persons=j.persons.split(',').map(s=>s.trim()).filter(Boolean);
      const pchips=persons.map(p=>{const c=PCOL[p]||'#64748b';return`<span class="pchip" style="background:${c}1e;color:${c};border-color:${c}44">คุณ${p}</span>`;}).join('');
      return`<div class="job-card${od?' overdue':''}" style="animation-delay:${ci*0.04}s">
        <div class="jc-top">
          <span class="jc-num">#${j.num}</span>
          <span class="jc-name">${j.name}${od?'<span class="overdue-tag" style="margin-left:.38rem">⚠ เกิน</span>':''}${j.notice?`<span class="notice-tag" style="margin-left:.3rem">📌 ${j.notice}</span>`:''}</span>
          <span class="jc-order">Order: ${Number(j.order).toLocaleString()}</span>
          ${j.time?`<span class="jc-time">🕐 ${od?`<b style="color:var(--red)">${j.time}</b>`:j.time}</span>`:''}
          <div class="jc-right">
            <div class="fg-box" style="color:${fgC};border-color:${fgC}44;background:${fgC}0d"
              onclick="startFgEdit(event,${JSON.stringify(j.id)},this)"
              title="คลิกเพื่อแก้ไข FG">
              📦 <span class="fg-val">${Number(j.fg).toLocaleString()}</span>&nbsp;/&nbsp;${Number(j.order).toLocaleString()}
            </div>
            <span class="jc-status ${scls}">${j.status}</span>
          </div>
        </div>
        <div class="jc-route-wrap">${renderJobRoute(j)}</div>
        ${renderProgressSummary(j)}
        <div class="jc-bottom">
          <div style="display:flex;gap:.2rem;flex-wrap:wrap">${pchips}</div>
          ${j.detail?`<div class="jc-detail">💬 ${j.detail}</div>`:''}
        </div>
      </div>`;
    }).join('');
    return`<div class="date-group">
      <div class="dg-head">
        <span class="dg-date">📅 ${fmtDate(dk)}${isToday?'<span class="today-tag">TODAY</span>':''}</span>
        <div class="dg-line"></div><span class="dg-cnt">${jobs.length} งาน</span>
      </div>${cards}</div>`;
  }).join('');
}

// ══ INLINE FG EDIT ═══════════════════════════════════
function startFgEdit(e,jobId,box){
  e.stopPropagation();
  const span=box.querySelector('.fg-val');
  const j=JOBS.find(x=>x.id===jobId);if(!j)return;
  const inp=document.createElement('input');
  inp.className='fg-edit';inp.type='number';inp.value=j.fg;inp.min=0;
  span.replaceWith(inp);inp.focus();inp.select();
  const commit=async()=>{
    const v=parseInt(inp.value)||0;
    inp.replaceWith(span);span.textContent=Number(v).toLocaleString();
    if(v===j.fg)return;
    j.fg=v;
    render();
    try{
      await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'updateFg',job_id:jobId,fg_qty:v,user:'operator'})});
      showToast('✅ อัปเดต FG แล้ว','success');
    }catch(err){showToast('⚠ Sync ไม่สำเร็จ','error');}
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e2=>{if(e2.key==='Enter')inp.blur();if(e2.key==='Escape'){inp.value=j.fg;inp.blur();}});
}

// ══ TIMELINE TAB ═════════════════════════════════════
function renderTimeline(){
  const dk=document.getElementById('tlDate').value||todayStr();
  const jobs=JOBS.filter(j=>j.date===dk);
  const el=document.getElementById('timelineContent');
  if(!jobs.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>ไม่มีงานในวันที่เลือก</div>';return;}

  if(tlMode==='process') renderTimelineProcess(jobs,el);
  else renderTimelineTime(jobs,el);
}

function renderTimelineProcess(jobs,el){
  const hdr=ROUTE.map(s=>{
    const col=PC[s]||'#64748b';
    return`<div class="tl-st-head" style="color:${col}">
      <div class="tl-st-dot" style="border-color:${col};background:${col}22"></div>${s}
    </div>`;
  }).join('');

  const rows=jobs.map(j=>{
    const pd=j.procData||{};const od=isOD(j);const scls=sCls(j.status);
    const cells=ROUTE.map(s=>{
      const col=PC[s]||'#64748b';const pst=pd[s]?.status;
      const aps=getActiveProcs(j);
      let bg='transparent',bc=col+'18',fc=col+'25',cls='tl-cell-inner',shadow='',lbl=s;
      if(j.status==='ส่งครบ'){bg=col+'14';bc=col+'30';fc=col+'60';cls+=' done';}
      else if(pst==='skip'){bg='transparent';bc=col+'12';fc=col+'18';cls+=' skip';}
      else if(pst==='done'){bg='#22c55e18';bc='#22c55e44';fc='#22c55e80';}
      else if(pst==='wip'||(aps.includes(s)&&!pst)){bg=col;bc=col;fc=ct(col);cls+=' wip';shadow=`box-shadow:0 0 12px ${col}66`;}
      const tip=pd[s]?.comment?`💬${pd[s].comment.slice(0,30)}`:'';
      return`<div class="tl-cell" onclick="openProcModal(${JSON.stringify(j.id)},'${s}')" title="${tip||'คลิกเพื่อบันทึก'}">
        <div class="${cls}" style="background:${bg};border-color:${bc};color:${fc};${shadow}">${pst==='skip'?'⊘':s}</div>
      </div>`;
    }).join('');
    return`<div class="tl-body-row">
      <div class="tl-job-info">
        <div class="tl-job-name" title="${j.name}">${j.name}${od?' <span style="color:var(--red);font-size:.55rem">⚠</span>':''}</div>
        <div class="tl-job-meta">Order: ${Number(j.order).toLocaleString()} | <span class="jc-status ${scls}" style="font-size:.58rem;padding:.06rem .35rem">${j.status}</span></div>
      </div>
      <div class="tl-cells">${cells}</div>
    </div>`;
  }).join('');

  el.innerHTML=`<div class="tl-wrap"><div class="tl-grid">
    <div class="tl-header"><div class="tl-row-label">งาน</div><div class="tl-stations">${hdr}</div></div>
    ${rows}
  </div></div>`;
}

function renderTimelineTime(jobs,el){
  // หาช่วงเวลา min-max จาก procData ที่มี time
  const times=[];
  jobs.forEach(j=>Object.values(j.procData||{}).forEach(p=>{if(p.time)times.push(p.time);}));
  jobs.forEach(j=>{if(j.time)times.push(j.time);});
  const toMin=t=>{const[h,m]=(t||'00:00').split(':').map(Number);return h*60+m;};
  const sorted=[...times].sort();
  let minT=Math.max(0,toMin(sorted[0]||'06:00')-30);
  let maxT=Math.min(1440,toMin(sorted[sorted.length-1]||'22:00')+60);
  if(minT>=maxT){minT=0;maxT=1440;}
  const span=maxT-minT||480;

  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const nowPct=nowMin>=minT&&nowMin<=maxT?((nowMin-minT)/span*100):null;

  // time axis header
  const tickCount=6;const tickH=[];
  for(let i=0;i<=tickCount;i++){
    const m=Math.round(minT+span*i/tickCount);
    const h=String(Math.floor(m/60)).padStart(2,'0'),mn=String(m%60).padStart(2,'0');
    tickH.push(`<div style="position:absolute;left:${i/tickCount*100}%;transform:translateX(-50%);font-size:.55rem;color:var(--text3);white-space:nowrap">${h}:${mn}</div>`);
  }

  const rows=jobs.map(j=>{
    const pd=j.procData||{};const od=isOD(j);const scls=sCls(j.status);
    // สร้าง bar สำหรับแต่ละ process ที่มีเวลา
    const bars=ROUTE.map(s=>{
      const p=pd[s];if(!p||!p.time)return'';
      const col=PC[s]||'#64748b';const pst=p.status||'wip';
      const barCol=pst==='done'?'#22c55e':pst==='skip'?'#64748b':col;
      const tMin=toMin(p.time);if(tMin<minT||tMin>maxT)return'';
      const leftPct=(tMin-minT)/span*100;
      const w=Math.max(3,(30/span*100)); // min width
      return`<div class="tl-time-bar" style="left:${leftPct}%;width:${w}%;background:${barCol}33;border:1.5px solid ${barCol}88;color:${barCol}" title="${s}: ${p.time}${p.comment?' | '+p.comment:''}">${s}</div>`;
    }).filter(Boolean).join('');

    // main job time bar
    let mainBar='';
    if(j.time){
      const tMin=toMin(j.time);
      const leftPct=Math.max(0,(tMin-minT)/span*100);
      mainBar=`<div style="position:absolute;left:${leftPct}%;width:3px;height:80%;top:10%;background:var(--accent);border-radius:2px;opacity:.7" title="นัด: ${j.time}"></div>`;
    }

    return`<div class="tl-body-row">
      <div class="tl-job-info">
        <div class="tl-job-name" title="${j.name}">${j.name}${od?' <span style="color:var(--red);font-size:.55rem">⚠</span>':''}</div>
        <div class="tl-job-meta"><span class="jc-status ${scls}" style="font-size:.58rem;padding:.06rem .35rem">${j.status}</span></div>
      </div>
      <div style="flex:1;position:relative;min-height:52px">
        ${nowPct!==null?`<div class="tl-now-line" style="left:${nowPct}%"></div>`:''}
        ${mainBar}${bars}
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`<div class="tl-wrap"><div class="tl-grid">
    <div class="tl-header">
      <div class="tl-row-label" style="font-size:.62rem;font-weight:700;color:var(--text3)">งาน</div>
      <div style="flex:1;position:relative;height:36px;padding-top:.3rem">${tickH.join('')}</div>
    </div>
    ${rows}
  </div></div>`;
}

// ══ PROCESS MODAL ════════════════════════════════════
function openProcModal(jobId,procId){
  const j=JOBS.find(x=>x.id===jobId);if(!j)return;
  const pd=j.procData?.[procId]||{};
  editJobId=jobId;editProcId=procId;editPS=pd.status||null;
  const col=PC[procId]||'#64748b';const tc=ct(col);
  document.getElementById('pm-title').innerHTML=
    `<span style="width:28px;height:28px;border-radius:50%;background:${col};color:${tc};display:inline-flex;align-items:center;justify-content:center;font-size:.54rem;font-weight:800;flex-shrink:0">${procId}</span>
     <span style="font-size:.85rem">${j.name}</span>`;
  document.getElementById('pm-time').value=pd.time||'';
  document.getElementById('pm-comment').value=pd.comment||'';
  document.querySelectorAll('.psb').forEach(b=>b.classList.remove('sel'));
  if(editPS){const b=document.querySelector(`.psb[data-ps="${editPS}"]`);if(b)b.classList.add('sel');}
  // history
  const hist=(j._history||[]).filter(h=>h.process===procId).slice(-3);
  const histEl=document.getElementById('pm-hist');
  if(hist.length){
    document.getElementById('pm-hist-items').innerHTML=hist.reverse().map(h=>
      `<div class="hist-item"><span class="hist-time">${h.timestamp||''}</span><span>${h.user||'—'}</span><span style="color:${h.new_val==='done'?'#22c55e':h.new_val==='skip'?'#64748b':'#eab308'}">${h.new_val||'—'}</span></div>`
    ).join('');
    histEl.style.display='block';
  }else{histEl.style.display='none';}
  document.getElementById('procModal').classList.add('open');
  // swipe to close (mobile)
  initSwipe('modalBox','procModal');
}
function selPS(s,el){
  editPS=editPS===s?null:s;
  document.querySelectorAll('.psb').forEach(b=>b.classList.remove('sel'));
  if(editPS)el.classList.add('sel');
}
async function saveProcEdit(){
  if(editJobId===null)return;
  const j=JOBS.find(x=>x.id===editJobId);if(!j)return;
  if(!j.procData)j.procData={};
  const newData={status:editPS,time:document.getElementById('pm-time').value,comment:document.getElementById('pm-comment').value.trim()};
  j.procData[editProcId]=newData;
  // update j.process field: rebuild from wip nodes
  const wipNodes=ROUTE.filter(s=>j.procData[s]?.status==='wip');
  if(wipNodes.length)j.process=wipNodes.join(',');
  closeModal();render();
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'upsertProcess',job_id:j.id,process:editProcId,
        data:{proc_status:newData.status||'',proc_time:newData.time||'',comment:newData.comment||''},user:'operator'})});
    showToast('✅ บันทึกแล้ว','success');
  }catch(e){showToast('⚠ Sync ไม่สำเร็จ','error');}
}
function closeModal(){
  document.getElementById('procModal').classList.remove('open');
  editJobId=null;editProcId=null;editPS=null;
}

// ══ SWIPE TO CLOSE ════════════════════════════════════
function initSwipe(boxId,modalId){
  const box=document.getElementById(boxId);if(!box)return;
  let sy=0,cy=0,active=false;
  box.ontouchstart=e=>{if(e.target.closest('select,input,textarea,button'))return;sy=e.touches[0].clientY;active=true;cy=0;box.style.transition='none';};
  box.ontouchmove=e=>{if(!active)return;cy=e.touches[0].clientY-sy;if(cy>0)box.style.transform=`translateY(${cy}px)`;};
  box.ontouchend=()=>{if(!active)return;active=false;box.style.transition='';if(cy>80){box.style.transform='';closeModal();}else box.style.transform='';};
}

// ══ KEYBOARD SHORTCUTS ═══════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='/')   {e.preventDefault();document.querySelector('.search-inp')?.focus();}
  if(e.key==='r'||e.key==='R') loadData(true);
  if(e.key==='Escape') closeModal();
  if(e.key==='1') switchTab('route');
  if(e.key==='2') switchTab('timeline');
});

// ══ UI HELPERS ═══════════════════════════════════════
let toastT;
function showToast(msg,type=''){
  clearTimeout(toastT);const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  toastT=setTimeout(()=>t.className='toast',2800);
}
function showError(msg){
  document.getElementById('routeContent').innerHTML=`
    <div class="empty" style="color:var(--red)">
      <div class="empty-icon">❌</div>
      <div style="margin-bottom:.8rem">${msg}</div>
      <button onclick="loadData(true)" class="btn btn-primary">ลองใหม่</button>
    </div>`;
}

// ══ INIT ═════════════════════════════════════════════
document.getElementById('tlDate').value=todayStr();
loadData(false);
</script>
